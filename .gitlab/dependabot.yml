version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Directory containing the requirements.txt file
    schedule:
      interval: "daily"
    commit-message:
      prefix: "dependabot"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nodejs"
    reviewers:
      - "rangga.putra"