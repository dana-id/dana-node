stages:
  - sast
  - test
  - build
  - publish
  - integration
  - sync

include:
  - template: Security/SAST.gitlab-ci.yml

# Common config for all SAST analyzers
.sast-analyzer:
  tags:
    - aliyun-sit-runner
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
      - reports/
    expire_in: 1 week
    when: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
  after_script:
    - apk add --no-cache jq
    - |
      # Detailed SAST report summary
      if [ -f gl-sast-report.json ]; then
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "                               SAST SECURITY REPORT                              "
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        # Scanner information
        echo "\n📊 SCAN DETAILS"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Scanner: $(jq -r '.scan.scanner.name' gl-sast-report.json) v$(jq -r '.scan.scanner.version' gl-sast-report.json)"
        echo "Started: $(jq -r '.scan.start_time' gl-sast-report.json)"
        echo "Completed: $(jq -r '.scan.end_time' gl-sast-report.json)"
        echo "Status: $(jq -r '.scan.status' gl-sast-report.json)"
        
        # Issue summary
        TOTAL=$(jq '.vulnerabilities | length' gl-sast-report.json)
        CRITICAL=$(jq '.vulnerabilities | map(select(.severity == "Critical")) | length' gl-sast-report.json)
        HIGH=$(jq '.vulnerabilities | map(select(.severity == "High")) | length' gl-sast-report.json)
        MEDIUM=$(jq '.vulnerabilities | map(select(.severity == "Medium")) | length' gl-sast-report.json)
        LOW=$(jq '.vulnerabilities | map(select(.severity == "Low")) | length' gl-sast-report.json)
        INFO=$(jq '.vulnerabilities | map(select(.severity == "Info")) | length' gl-sast-report.json)
        
        echo "\n🔍 FINDINGS SUMMARY"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Total issues: $TOTAL"
        echo "  - Critical: $CRITICAL"
        echo "  - High:     $HIGH"
        echo "  - Medium:   $MEDIUM"
        echo "  - Low:      $LOW"
        echo "  - Info:     $INFO"
        
        # Most affected files
        echo "\n📁 MOST AFFECTED FILES"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        jq -r '.vulnerabilities | group_by(.location.file) | map({file: .[0].location.file, count: length}) | sort_by(.count) | reverse | .[0:5] | .[] | "  - \(.file): \(.count) issues"' gl-sast-report.json
        
        # Most common issue types
        echo "\n⚠️ MOST COMMON ISSUE TYPES"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        jq -r '.vulnerabilities | group_by(.message) | map({message: .[0].message, count: length}) | sort_by(.count) | reverse | .[0:5] | .[] | "  - \(.message): \(.count) occurrences"' gl-sast-report.json
        
        # Process and display each vulnerability separately to avoid YAML parsing issues
        echo "\n🛡️ DETAILED FINDINGS"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        # Extract total number of vulnerabilities
        VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
        
        # Loop through each vulnerability
        for i in $(seq 0 $(($VULN_COUNT - 1))); do
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Extract details for this vulnerability
          SEVERITY=$(jq -r ".vulnerabilities[$i].severity" gl-sast-report.json)
          MESSAGE=$(jq -r ".vulnerabilities[$i].message" gl-sast-report.json)
          CATEGORY=$(jq -r ".vulnerabilities[$i].category" gl-sast-report.json)
          ID=$(jq -r ".vulnerabilities[$i].id" gl-sast-report.json)
          FILE=$(jq -r ".vulnerabilities[$i].location.file" gl-sast-report.json)
          START_LINE=$(jq -r ".vulnerabilities[$i].location.start_line" gl-sast-report.json)
          END_LINE=$(jq -r ".vulnerabilities[$i].location.end_line" gl-sast-report.json 2>/dev/null || echo "$START_LINE")
          DESCRIPTION=$(jq -r ".vulnerabilities[$i].description" gl-sast-report.json)
          SCANNER=$(jq -r ".vulnerabilities[$i].scanner.name" gl-sast-report.json)
          
          # Print vulnerability details
          echo "[★ $SEVERITY] $MESSAGE"
          echo "• Category: $CATEGORY"
          echo "• ID: $ID"
          echo "• Location: $FILE"
          
          if [ "$START_LINE" = "$END_LINE" ] || [ -z "$END_LINE" ]; then
            echo "• Line: $START_LINE"
          else
            echo "• Lines: $START_LINE-$END_LINE"
          fi
          
          echo "• Description: $DESCRIPTION"
          echo "• Scanner: $SCANNER"
          echo "\n• Identifiers:"
          
          # Extract number of identifiers
          ID_COUNT=$(jq -r ".vulnerabilities[$i].identifiers | length" gl-sast-report.json)
          
          # Loop through each identifier
          for j in $(seq 0 $(($ID_COUNT - 1))); do
            ID_TYPE=$(jq -r ".vulnerabilities[$i].identifiers[$j].type" gl-sast-report.json)
            ID_NAME=$(jq -r ".vulnerabilities[$i].identifiers[$j].name" gl-sast-report.json)
            ID_VALUE=$(jq -r ".vulnerabilities[$i].identifiers[$j].value" gl-sast-report.json)
            ID_URL=$(jq -r ".vulnerabilities[$i].identifiers[$j].url" gl-sast-report.json)
            
            echo "    - $ID_TYPE: $ID_NAME ($ID_VALUE)"
            echo "      URL: $ID_URL"
          done
          
          echo ""
        done
        
        echo "\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "                            END OF SECURITY REPORT                             "
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      else
        echo "No SAST report found (gl-sast-report.json does not exist)"
      fi

semgrep-sast:
  stage: sast
  extends: .sast-analyzer

# Define when SAST runs
.sast:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

.npm-test:
  stage: test
  tags: 
    - aliyun-sit-runner
  script:
    - node -v
    - npm install-test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

node-test-22:
  extends: .npm-test
  image: node:22-alpine

node-test-20:
  extends: .npm-test
  image: node:20-alpine

node-test-18:
  extends: .npm-test
  image: node:18-alpine

build-package:
  stage: build
  image: node:22-alpine
  tags:
    - aliyun-sit-runner
  script:
    - |
      if echo "$CI_COMMIT_TAG" | grep -Eq '^v[0-9]+\.[0-9]+(\.[0-9]+)?(-rc\.[0-9]+)?$'; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i 's/"version": "[^"]*"/"version": "'$VERSION'"/' package.json
        echo "Updated version to: $VERSION"
      else
        echo "Tag format invalid or not provided. Skipping version update."
      fi
    - npm install
  artifacts:
    paths:
      - ./
    expire_in: 1h
  only:
    - tags

publish-to-gitlab:
  stage: publish
  image: node:22-alpine
  tags:
    - aliyun-sit-runner
  script:
    # If no .npmrc is included in the repo, generate a temporary one that is configured to publish to GitLab's NPM registry
    - |
      if [[ ! -f .npmrc ]]; then
        echo 'No .npmrc found! Creating one now. Please review the following link for more information: https://docs.gitlab.com/ee/user/packages/npm_registry/#with-the-npmrc-file'
        {
          echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
          echo "${CI_API_V4_URL#http*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}"
        } >> .npmrc
      fi
    - echo "Created the following .npmrc:"; cat .npmrc

    # Extract a few values from package.json
    - NPM_PACKAGE_NAME=$(node -p "require('./package.json').name")
    - NPM_PACKAGE_VERSION=$(node -p "require('./package.json').version")

    # Change name in package.json to match the GitLab NPM registry
    - |
      if [[ ! -z "${CI_PROJECT_ROOT_NAMESPACE}" ]]; then
        echo "Changing package name to @${CI_PROJECT_ROOT_NAMESPACE}/${NPM_PACKAGE_NAME}"
        sed -i 's/"name": "[^"]*"/"name": "@'"${CI_PROJECT_ROOT_NAMESPACE}"'\/'"${NPM_PACKAGE_NAME}"'"/' package.json
        NPM_PACKAGE_NAME="@${CI_PROJECT_ROOT_NAMESPACE}/${NPM_PACKAGE_NAME}"
      fi

    # Compare the version in package.json to all published versions.
    # If the package.json version has not yet been published, run `npm publish`.
    # If $SIGSTORE_ID_TOKEN is set this template will generate a provenance
    # document. For more information refer to the documentation: https://docs.gitlab.com/ee/ci/yaml/signing_examples/
    - |
      if [[ "$(npm view ${NPM_PACKAGE_NAME} versions)" != *"'${NPM_PACKAGE_VERSION}'"* ]]; then
        if [[ -n "${SIGSTORE_ID_TOKEN}" ]]; then
          npm publish --provenance
        else
          npm publish
        fi
        echo "Successfully published version ${NPM_PACKAGE_VERSION} of ${NPM_PACKAGE_NAME} to GitLab's NPM registry: ${CI_PROJECT_URL}/-/packages"
      else
        echo "Version ${NPM_PACKAGE_VERSION} of ${NPM_PACKAGE_NAME} has already been published, so no new version has been published."
      fi
  needs:
    - job: build-package
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/'
      when: always

integration-test:
  stage: integration
  image: node:22-alpine
  tags: 
    - aliyun-sit-runner
  variables:
    PRIVATE_KEY: $PRIVATE_KEY
    X_PARTNER_ID: $X_PARTNER_ID
    ORIGIN: $ORIGIN
    CHANNEL_ID: $CHANNEL_ID
    MERCHANT_ID: $MERCHANT_ID
  script:
    # Install required tools
    - apk add --no-cache git jq sed
    
    # Create .netrc file for GitLab authentication
    - |
      cat > ~/.netrc << EOF
      machine gitlab.dana.id
      login gitlab-ci-token
      password ${CI_JOB_TOKEN}
      EOF
      chmod 600 ~/.netrc
      
    # Set up npm for private registry access
    - echo "Configuring npm for private GitLab registry access"
    - npm config set @automation:registry https://gitlab.dana.id/api/v4/packages/npm/
    - npm config set //gitlab.dana.id/api/v4/packages/npm/:_authToken ${CI_JOB_TOKEN}
    - npm config set //gitlab.dana.id/api/v4/projects/${GITLAB_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}
    
    # Clone the integration test repository
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.dana.id/automation/dana-self-integration-test.git
    - cd dana-self-integration-test
    
    # Modify the package.json to use private package with correct version
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        echo "Using private package with version: $CI_COMMIT_TAG"
        
        # Check if package.json exists
        if [ -f "test/node/package.json" ]; then
          # Backup original package.json
          cp test/node/package.json test/node/package.json.bak
          
          # Replace the public package with private package and version
          # Format the version correctly - strip the 'v' prefix if present
          VERSION=${CI_COMMIT_TAG#v}
          echo "Using version $VERSION for package installation"
          jq 'del(.dependencies["dana-node-api-client"]) | .dependencies["@automation/dana-node-api-client"] = "'"$VERSION"'"' test/node/package.json.bak > test/node/package.json
          
          echo "Modified package.json to use private package:"
          cat test/node/package.json
        else
          echo "ERROR: package.json file does not exist in test/node directory."
          echo "Integration tests cannot proceed without a proper package.json file."
          exit 1
        fi
      else
        echo "ERROR: No version tag found. Integration tests must run with a specific tag."
        exit 1
      fi

    # Remove specific line from run-test.sh
    - sed -i '/npm install --save dana-node-api-client dotenv/d' run-test.sh
    - sed -i '/npm install --save-dev jest/d' run-test.sh

    # Run npm install

    - echo "Running npm install..."
    - cd test/node
    - npm install --save
    - npm install --save dana-node-api-client@npm:@automation/dana-node-api-client@${CI_COMMIT_TAG#v}
    - cd ../..

    - echo "Creating .env file from CI variables..."
    - |
      cat > .env << EOF
      MERCHANT_ID=${MERCHANT_ID}
      X_PARTNER_ID=${X_PARTNER_ID}
      CHANNEL_ID=${CHANNEL_ID}
      PRIVATE_KEY='${PRIVATE_KEY}'
      ORIGIN=${ORIGIN}
      EOF
    - echo "Created .env file"
    - echo "Running integration tests with Node.js..."
    - ls -la test/node
    - cat test/node/package.json
    - |
      if ! sh run-test.sh node; then
        echo "Integration tests failed. Check the logs above for details."
        exit 1
      fi
  needs:
    - job: publish-to-gitlab
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/'
      when: always

verify-rc-integration:
  stage: test
  image: alpine:latest
  tags:
    - aliyun-sit-runner
  script:
    # Install required tools
    - 'apk add --no-cache curl jq python3 git'
    # Extract version from tag
    - 'VERSION=${CI_COMMIT_TAG#v}'
    - 'echo "Looking for RC tags for version $VERSION"'
    # Download verification script from central repository
    - 'mkdir -p temp_scripts'
    - 'git clone --depth 1 https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.dana.id/automation/dana-api-client-generator.git temp_scripts/repo'
    - 'cp temp_scripts/repo/scripts/ci/verify_rc_integration.py temp_scripts/'
    - 'chmod +x temp_scripts/verify_rc_integration.py'
    # Run the verification script
    - 'LATEST_RC=$(python3 temp_scripts/verify_rc_integration.py "$VERSION")'
    - 'EXIT_CODE=$?'
    - 'if [ $EXIT_CODE -ne 0 ]; then echo "Failed to find RC tag with passing integration tests"; exit 1; fi'
    - 'echo "Verified RC tag for release: $LATEST_RC"'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always

publish-to-npm:
  stage: publish
  image: node:22-alpine
  tags:
    - aliyun-sit-runner
  script:
    # If no .npmrc is included in the repo, generate a temporary one that is configured to publish to NPM registry
    - |
      if [[ ! -f .npmrc ]]; then
        echo 'No .npmrc found! Creating one now.'
        {
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
        } >> .npmrc
      fi
    - echo "Created the following .npmrc:"; cat .npmrc

    # Extract a few values from package.json
    - NPM_PACKAGE_NAME=$(node -p "require('./package.json').name")
    - NPM_PACKAGE_VERSION=$(node -p "require('./package.json').version")
    - NPM_PACKAGE_URL=https://npmjs.org/package/${NPM_PACKAGE_NAME}

    # Compare the version in package.json to all published versions.
    # If the package.json version has not yet been published, run `npm publish`.
    - |
      if [[ "$(npm view ${NPM_PACKAGE_NAME} versions)" != *"'${NPM_PACKAGE_VERSION}'"* ]]; then
        npm publish
        echo "Successfully published version ${NPM_PACKAGE_VERSION} of ${NPM_PACKAGE_NAME} to NPM: ${NPM_PACKAGE_URL}"
      else
        echo "Version ${NPM_PACKAGE_VERSION} of ${NPM_PACKAGE_NAME} has already been published, so no new version has been published."
      fi
  needs:
    - job: build-package
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual

sync-to-github:
  stage: sync
  image: node:22-alpine
  tags:
    - aliyun-sit-runner
  variables:
    GITHUB_REPO: "dana-id/node_client"
  needs:
    - job: build-package
      artifacts: true
    - job: publish-to-npm
  before_script:
    - apk add --no-cache git rsync
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@dana.id"
  script:
    - echo "Preparing to sync to GitHub..."
    # Using access token in a more explicit format for authentication
    - git clone https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git /tmp/github-sync || mkdir -p /tmp/github-sync
    - cd /tmp/github-sync

    # If repository exists, use it; otherwise initialize a new one
    - |
      if [ -d ".git" ]; then
        echo "Using existing repository"
        git checkout main || git checkout -b main
      else
        echo "Initializing new repository"
        git init
        git config user.name "GitLab CI"
        git config user.email "ci@dana.id"
        git remote add origin https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git
        git branch -M main
      fi

    # Copy files from project directory, preserving .git
    - echo "Copying files from project directory..."
    - cd $CI_PROJECT_DIR
    - rsync -av --ignore-errors --exclude="tsconfig.json" --exclude="package-lock.json" --exclude=".npmignore" --exclude=".git/" --exclude=".gitlab-ci.yml" --exclude=".gitignore" --exclude="tests/" --exclude="node_modules/" --exclude="temp_scripts/" ./ /tmp/github-sync/

    # Commit and push changes
    - cd /tmp/github-sync
    - git add .
    - git diff --staged --quiet || git commit -m "Generated DANA Node SDK"
    - echo "Pushing to GitHub..."
    - git push https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git main

    # Create and push tag on main branch
    - git tag ${CI_COMMIT_TAG}
    - git push https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git ${CI_COMMIT_TAG}
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success

.dependabot:
  image:
    name: docker.io/andrcuns/dependabot-gitlab-npm:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: none
    PACKAGE_MANAGER: $CI_JOB_NAME
    RAILS_ENV: production
    SETTINGS__GITLAB_URL: $CI_SERVER_URL
    SETTINGS__STANDALONE: "true"
  before_script:
    - cd /home/dependabot/app
  script:
    - bundle exec rake "dependabot:update[$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME,$PACKAGE_MANAGER,/]"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_NAME == "dependabot"'
  tags:
    - aliyun-sit-runner

npm:
  extends: .dependabot
